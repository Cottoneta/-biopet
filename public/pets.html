<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#FFF6D8;
  font-family:'Nunito', sans-serif;
  overflow-x:hidden;
}

/* =========================
   NAVBAR
========================= */

nav{
  width:100%;
  padding:25px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  width:110px;
  transition:0.3s;
}

.logo img:hover{
  transform:scale(1.05);
}

.menu{
  display:flex;
  gap:40px;
}

.menu a{
  text-decoration:none;
  color:#7DA2D6;
  font-weight:800;
  transition:0.3s;
}

.menu a:hover{
  transform:scale(1.1);
  color:#5D87C2;
}

.btn-nav{
  padding:14px 28px;
  border:none;
  border-radius:50px;
  background:#A7C7FF;
  color:white;
  font-weight:800;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 8px 18px rgba(125,162,214,0.25);
}

.btn-nav:hover{
  transform:scale(1.05);
  border:2px solid white;
}

/* =========================
   TITULO
========================= */

.section-header{
  text-align:center;
  margin-top:40px;
}

.section-title{
  font-family:'Chewy', cursive;
  font-size:70px;
  color:#7DA2D6;

  text-shadow:
  4px 4px 0px #ffffff,
  8px 8px 15px rgba(0,0,0,0.12);
}

.section-sub{
  color:#6E89A8;
  font-size:18px;
  font-weight:700;
  margin-top:15px;
}

/* =========================
   BOTONES CATEGORIAS
========================= */

.category-tabs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:18px;
  margin-top:40px;
  padding:0 20px;
}

.cat-btn{
  padding:14px 30px;
  border:none;
  border-radius:50px;
  background:#A7C7FF;
  color:white;
  font-weight:800;
  cursor:pointer;
  transition:0.3s;
  font-size:15px;
  box-shadow:0 8px 18px rgba(125,162,214,0.2);
}

.cat-btn:hover{
  transform:translateY(-4px) scale(1.05);
  border:2px solid white;
}

.cat-btn.active{
  background:#7DA2D6;
}

/* =========================
   CARRUSEL
========================= */

.carousel-container{
  width:100%;
  margin-top:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  min-height:500px;
}

.carousel-stage{
  width:100%;
  height:500px;
  position:relative;
}

.reptile-item{
  position:absolute;
  transition:0.5s;
  cursor:pointer;
}

/* POSICIONES */

.pos-center{
  left:50%;
  top:50%;
  transform:translate(-50%, -50%) scale(1);
  z-index:5;
}

.pos-side1{
  left:25%;
  top:55%;
  transform:translate(-50%, -50%) scale(0.8);
  opacity:0.7;
}

.pos-side2{
  left:75%;
  top:55%;
  transform:translate(-50%, -50%) scale(0.8);
  opacity:0.7;
}

.pos-far1{
  left:8%;
  top:60%;
  transform:translate(-50%, -50%) scale(0.6);
  opacity:0.4;
}

.pos-far2{
  left:92%;
  top:60%;
  transform:translate(-50%, -50%) scale(0.6);
  opacity:0.4;
}

/* =========================
   TARJETAS
========================= */

.pet-card{

  width:280px;
  background:#FFECC4;
  border-radius:35px;
  overflow:visible;
  position:relative;
  transition:0.4s;

  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.pet-card:hover{
  transform:translateY(-10px) scale(1.03);
}

.pet-image{
  width:100%;
  height:220px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.pet-image img{
  width:320px;
  position:absolute;
  top:-30px;
  transition:0.4s;
}

.pet-card:hover .pet-image img{
  transform:scale(1.05) rotate(-2deg);
}

.pet-content{
  padding:25px;
  padding-top:150px;
  text-align:center;
}

.pet-content h3{
  color:#7DA2D6;
  font-size:30px;
  margin-bottom:10px;
  font-family:'Chewy', cursive;
}

.pet-content p{
  color:#6E89A8;
  font-weight:700;
  font-size:15px;
}

/* =========================
   FLECHAS
========================= */

.carousel-arrows{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.arrow-btn{
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:#A7C7FF;
  color:white;
  font-size:25px;
  cursor:pointer;
  transition:0.3s;
}

.arrow-btn:hover{
  transform:scale(1.1);
}

/* =========================
   MODAL
========================= */

.info-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.info-overlay.open{
  display:flex;
}

.info-panel{
  width:850px;
  max-width:95%;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(10px);
  border-radius:35px;
  padding:40px;
  display:flex;
  gap:35px;
  position:relative;
  max-height:90vh;
  overflow:hidden;
}

.btn-close{
  position:absolute;
  right:25px;
  top:20px;
  border:none;
  background:none;
  font-size:28px;
  cursor:pointer;
  color:#7DA2D6;
}

.info-img-side img{
  width:280px;
}

.info-title{
  font-family:'Chewy', cursive;
  color:#7DA2D6;
  font-size:45px;
  margin-bottom:12px;
}

/* ---- TABS DEL MODAL ---- */

.modal-tabs{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

.modal-tab-btn{
  padding:9px 22px;
  border:none;
  border-radius:50px;
  background:#E8F0FF;
  color:#7DA2D6;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
  transition:0.25s;
  font-family:'Nunito', sans-serif;
}

.modal-tab-btn:hover{
  background:#A7C7FF;
  color:white;
}

.modal-tab-btn.active{
  background:#7DA2D6;
  color:white;
}

/* ---- CONTENIDO DE TABS ---- */

.tab-content{
  display:none;
  overflow-y:auto;
  max-height:calc(90vh - 200px);
  padding-right:6px;
}

.tab-content.active{
  display:block;
}

.tab-content::-webkit-scrollbar{
  width:5px;
}
.tab-content::-webkit-scrollbar-thumb{
  background:#A7C7FF;
  border-radius:10px;
}

.info-table{
  width:100%;
}

.info-table td{
  padding:10px;
  color:#6E89A8;
  font-weight:700;
}

.info-tags{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.info-tag{
  padding:10px 18px;
  border-radius:50px;
  background:#A7C7FF;
  color:white;
  font-size:14px;
  font-weight:700;
}

/* ---- SECCION DE CUIDADOS ---- */

.care-section{
  margin-bottom:18px;
}

.care-section-title{
  font-family:'Chewy', cursive;
  font-size:20px;
  color:#7DA2D6;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:8px;
}

.care-section-title .icon{
  font-size:22px;
}

.care-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.care-tag{
  padding:7px 14px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
  color:white;
}

.care-tag.danger{
  background:#FF8FA3;
}

.care-tag.warning{
  background:#FFB347;
}

.care-tag.delicate{
  background:#C9A7FF;
}

.care-tag.prone{
  background:#FF9E9E;
}

.care-tag.food{
  background:#7DD6A0;
}

/* =========================
   FOOTER
========================= */

footer{
  margin-top:100px;
  background:#A7C7FF;
  color:white;
  text-align:center;
  padding:22px;
  font-weight:700;
}

/* RESPONSIVE */

@media(max-width:900px){

  nav{
    flex-direction:column;
    gap:20px;
  }

  .menu{
    flex-wrap:wrap;
    justify-content:center;
  }

  .section-title{
    font-size:50px;
  }

  .info-panel{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .modal-tabs{
    justify-content:center;
  }

  .care-list{
    justify-content:center;
  }

}

/* =========================
   VARIABLES
========================= */

let categoriaActual = 'perros';

let centerIndex = 0;

const positions = [
  'pos-far1',
  'pos-side1',
  'pos-center',
  'pos-side2',
  'pos-far2'
];

/* =========================
   CAMBIAR CATEGORIA
========================= */

function changeCategory(cat, btn){

  categoriaActual = cat;

  centerIndex = 0;

  document.querySelectorAll('.cat-btn')
  .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  buildCarousel();

}

/* =========================
   CREAR CARRUSEL
========================= */

function buildCarousel(){

  const stage =
  document.getElementById('carouselStage');

  stage.innerHTML = '';

  const mascotas =
  mascotasData[categoriaActual];

  const total = mascotas.length;

  const offsets = [-2,-1,0,1,2];

  offsets.forEach((offset,posIdx)=>{

    const dataIdx =
    ((centerIndex + offset)%total + total)%total;

    const pet = mascotas[dataIdx];

    const item = document.createElement('div');

    item.className =
    `reptile-item ${positions[posIdx]}`;

    item.innerHTML = `

    <div class="pet-card">

      <div class="pet-image">

        <img src="${pet.img}" alt="${pet.nombre}">

      </div>

      <div class="pet-content">

        <h3>${pet.nombre}</h3>

        <p>${pet.datos.Personalidad}</p>

      </div>

    </div>

    `;

    item.addEventListener('click',()=>{

      if(positions[posIdx] === 'pos-center'){

        openPanel(dataIdx);

      }else{

        rotate(offset);

      }

    });

    stage.appendChild(item);

  });

}

/* =========================
   ROTAR
========================= */

function rotate(dir){

  const total =
  mascotasData[categoriaActual].length;

  centerIndex =
  ((centerIndex + dir)%total + total)%total;

  buildCarousel();

}

/* =========================
   CAMBIAR TAB EN MODAL
========================= */

function switchTab(tabName, btn){

  document.querySelectorAll('.tab-content')
  .forEach(t => t.classList.remove('active'));

  document.querySelectorAll('.modal-tab-btn')
  .forEach(b => b.classList.remove('active'));

  document.getElementById('tab-' + tabName)
  .classList.add('active');

  btn.classList.add('active');

}

/* =========================
   ABRIR MODAL
========================= */

function openPanel(idx){

  const pet =
  mascotasData[categoriaActual][idx];

  document.getElementById('panelImg').src =
  pet.img;

  document.getElementById('panelName').textContent =
  pet.nombre;

  // Tab general
  document.getElementById('panelTable').innerHTML =

  Object.entries(pet.datos)

  .map(([k,v]) => `

    <tr>
      <td>${k}</td>
      <td>${v}</td>
    </tr>

  `).join('');

  document.getElementById('panelTags').innerHTML =

  pet.tags.map(tag =>

    `<span class="info-tag">${tag}</span>`

  ).join('');

  // Tab cuidados
  const c = pet.cuidados;

  document.getElementById('careAlergenos').innerHTML =
  c.alergenos.map(a => `<span class="care-tag warning">${a}</span>`).join('');

  document.getElementById('careToxicos').innerHTML =
  c.toxicos.map(a => `<span class="care-tag danger">${a}</span>`).join('');

  document.getElementById('careDelicadas').innerHTML =
  c.delicadas.map(a => `<span class="care-tag delicate">${a}</span>`).join('');

  document.getElementById('carePropensiones').innerHTML =
  c.propensiones.map(a => `<span class="care-tag prone">${a}</span>`).join('');

  document.getElementById('careAlimentos').innerHTML =
  c.alimentos.map(a => `<span class="care-tag food">${a}</span>`).join('');

  // Siempre abrir en tab general
  document.querySelectorAll('.tab-content')
  .forEach(t => t.classList.remove('active'));

  document.querySelectorAll('.modal-tab-btn')
  .forEach(b => b.classList.remove('active'));

  document.getElementById('tab-general').classList.add('active');
  document.querySelectorAll('.modal-tab-btn')[0].classList.add('active');

  document.getElementById('infoOverlay')
  .classList.add('open');

  document.body.style.overflow = 'hidden';

}

/* =========================
   CERRAR MODAL
========================= */

function closeOverlay(){

  document.getElementById('infoOverlay')
  .classList.remove('open');

  document.body.style.overflow = '';

}

function closePanel(e){

  if(e.target.id === 'infoOverlay'){

    closeOverlay();

  }

}

/* =========================
   TECLADO
========================= */

document.addEventListener('keydown', e=>{

  if(e.key === 'Escape'){
    closeOverlay();
  }

  if(e.key === 'ArrowLeft'){
    rotate(-1);
  }

  if(e.key === 'ArrowRight'){
    rotate(1);
  }

});

/* =========================
   INICIAR
========================= */

buildCarousel();

</script>

</body>
</html>
